{% block content %}
{% if messages %}
<div class="container mx-auto card p-4">
{% for message in messages %}
                {% if message.tags == 'error' %}
                    <div class="mb-3 alert alert-danger">{{ message }}</div>
                {% else %}
                    <div class="mb-3 alert alert-success">{{ message }}</div>
                {% endif %}
            {% endfor %}
</div>
{% endif %}
{% endblock %}
