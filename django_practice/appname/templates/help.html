{% extends 'components/base.html'%}

{% block title %}
    {{block.super}}
{% endblock %}

{% block content %}
{% include 'components/navbar.html' %}
<div class="container py-5">

    <form  action= "{% url 'save_data' %}" method= "post" class="container mx-auto card p-4">
            {% include 'components/showMessage.html' %}
        {% csrf_token %}
        <div class="mb-3">
            <label for="title">Note Title</label>
            <input 
                name = "title"
                type="text" 
                id="title" 
                class="form-control" 
                placeholder="Enter Note Title">
        </div>

        <div class="mb-3">
            <label for="desc">Note Description</label>
            <textarea 
                name = "description"
                rows="5" 
                id="desc" 
                class="form-control" 
                placeholder="Enter Note Description"></textarea>
        </div>

        <div class="mb-3">
            <button 
                style="width: 100%;" 
                class="btn btn-primary">
                Add Note
            </button>
        </div>
    </form>


</div>

{% endblock %}
